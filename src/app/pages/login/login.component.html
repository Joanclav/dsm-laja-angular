<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">

    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-dsm-light/20 rounded-full flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-dsm-main" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">
        Bienvenido
      </h2>
      <p class="mt-2 text-sm text-gray-500">
        Ingresa tus credenciales para acceder al portal
      </p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onLogin()">
      <div class="rounded-md shadow-sm -space-y-px">

        <div class="mb-4">
          <label for="email-address" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
          <input
            id="email-address"
            name="email"
            type="email"
            [(ngModel)]="email"
            required
            class="appearance-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-dsm-main focus:border-dsm-main focus:z-10 sm:text-sm transition-colors"
            placeholder="ejemplo@correo.cl">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            [(ngModel)]="password"
            required
            class="appearance-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-dsm-main focus:border-dsm-main focus:z-10 sm:text-sm transition-colors"
            placeholder="••••••••">
        </div>
      </div>

      <div>
        <button
          type="submit"
          [disabled]="loading"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-dsm-main hover:bg-dsm-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-dsm-main disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md hover:shadow-lg">

          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <svg class="h-5 w-5 text-dsm-light group-hover:text-white transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </span>

          {{ loading ? 'Verificando datos...' : 'Iniciar Sesión' }}
        </button>
      </div>

      <div class="text-center mt-4">
        <p class="text-sm text-gray-600">
          ¿No tienes cuenta?
          <a routerLink="/registro" class="font-medium text-dsm-main hover:text-dsm-dark transition-colors hover:underline">
            Regístrate aquí
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
