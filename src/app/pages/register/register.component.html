<div class="min-h-screen bg-gray-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg">

    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-dsm-main">Crear Cuenta</h2>
      <p class="mt-2 text-sm text-gray-600">
        Solicita tu acceso al portal DSM Laja.
      </p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="rounded-md shadow-sm -space-y-px">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700">Nombre Completo</label>
          <<input type="text" required [(ngModel)]="nombre" name="nombre" class="..." required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-dsm-main focus:border-dsm-main sm:text-sm">
        </div>

        <div class="flex gap-4 mb-4">
          <div class="w-1/2">
            <label class="block text-sm font-medium text-gray-700">RUT</label>
            <input type="text" placeholder="12.345.678-9" required [(ngModel)]="rut" name="rut" class="..." placeholder="12.345.678-9" required class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:border-dsm-main">
          </div>
          <div class="w-1/2">
            <label class="block text-sm font-medium text-gray-700">Teléfono</label>
            <input type="tel" placeholder="+569..." required [(ngModel)]="telefono" name="telefono" class="..." placeholder="+569..." required class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:border-dsm-main">
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
          <input type="email" required [(ngModel)]="email" name="email" class="..." required class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:border-dsm-main">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700">Contraseña</label>
          <input type="password" required [(ngModel)]="password" name="password" class="..." required class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:border-dsm-main">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loading" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-dsm-main hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-dsm-main disabled:opacity-50">
          {{ loading ? 'Creando cuenta...' : 'Solicitar Registro' }}
        </button>
      </div>

      <div class="text-sm text-center">
        <a routerLink="/login" class="font-medium text-dsm-main hover:text-green-700">
          ¿Ya tienes cuenta? Inicia sesión aquí
        </a>
      </div>
    </form>
  </div>
</div>
