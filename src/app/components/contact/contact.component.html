<section id="contacto" class="py-16 px-4 bg-white">

  <div *ngIf="isSubmitted" class="container mx-auto max-w-2xl bg-gray-50 p-8 rounded-lg shadow-lg text-center border border-dsm-main">
    <div class="text-dsm-main mx-auto mb-4 flex justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <h2 class="text-2xl font-bold text-dsm-main mb-2">¡Mensaje Enviado!</h2>
    <p class="text-gray-600">Gracias por contactar al DSM Laja.</p>
    <button (click)="isSubmitted = false" class="mt-6 text-dsm-main font-bold hover:underline">
      Enviar otro mensaje
    </button>
  </div>

  <div *ngIf="!isSubmitted" class="container mx-auto max-w-4xl">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold text-dsm-main pb-2 border-b-4 border-dsm-main inline-block">
        Contacto
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
      <div class="space-y-6">
        <h3 class="text-xl font-bold text-gray-800">¿Tienes dudas?</h3>
        <div class="bg-gray-50 p-6 rounded-lg space-y-4 border-l-4 border-dsm-main">
          <div>
            <p class="font-bold text-dsm-main text-lg flex items-center gap-2">📍 Dirección</p>
            <p class="text-gray-600">Calle Fritz 101, Laja</p>
          </div>
          <div>
            <p class="font-bold text-dsm-main text-lg flex items-center gap-2">📧 Email</p>
            <p class="text-gray-600">contacto&#64;dsmlaja.cl</p>
          </div>
        </div>
      </div>

      <form (submit)="onSubmit($event)" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-dsm-main mb-1">Tu Correo</label>
          <input [(ngModel)]="email" name="email" id="email" type="email" class="w-full p-3 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-dsm-main" required placeholder="nombre@ejemplo.com">
        </div>

        <div>
          <label for="message" class="block text-sm font-medium text-dsm-main mb-1">Mensaje</label>
          <textarea [(ngModel)]="message" name="message" id="message" rows="4" class="w-full p-3 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-dsm-main" required placeholder="Escribe tu consulta aquí..."></textarea>
        </div>

        <button type="submit" class="w-full bg-dsm-main text-white font-bold py-3 px-6 rounded-md hover:bg-dsm-dark transition duration-300 flex items-center justify-center gap-2">
          Enviar Mensaje
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>
  </div>
</section>
