<section id="programas" class="py-16 bg-white">
  <div class="container mx-auto px-4">

    <div class="text-center mb-12">
      <h2 class="text-3xl font-bold text-dsm-main pb-2 border-b-4 border-dsm-main inline-block">
        Nuestros Programas
      </h2>
      <p class="mt-4 text-gray-600 max-w-2xl mx-auto">
        Ofrecemos atención integral a través de diversas áreas enfocadas en tu bienestar y el de tu familia.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <div *ngFor="let program of programs" class="group bg-gray-50 hover:bg-dsm-main transition duration-300 p-8 rounded-xl border border-gray-200 hover:border-dsm-main shadow-sm hover:shadow-xl">

        <div class="w-14 h-14 bg-dsm-main text-white group-hover:bg-white group-hover:text-dsm-main rounded-full flex items-center justify-center mb-6 transition duration-300">

          <ng-container [ngSwitch]="program.icon">
            <svg *ngSwitchCase="'heart'" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            <svg *ngSwitchCase="'woman'" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="6"/><path d="M12 22V16"/><path d="M8 19h8"/></svg>
            <svg *ngSwitchCase="'brain'" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 3 2.5 2.5 0 0 0 .82 2.76 2.5 2.5 0 0 0 3.32.74 2.5 2.5 0 0 0 3.12 1.46 2.5 2.5 0 0 0 1 0 2.5 2.5 0 0 0 3.12-1.46 2.5 2.5 0 0 0 3.32-.74 2.5 2.5 0 0 0 .82-2.76 2.5 2.5 0 0 0-1.32-3 2.5 2.5 0 0 0-1.98-3 2.5 2.5 0 0 0-4.96.46Z"/><path d="M12 10v10"/></svg>
            <svg *ngSwitchCase="'senior'" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" x2="20" y1="8" y2="14"/><line x1="23" x2="17" y1="11" y2="11"/></svg>
            <svg *ngSwitchCase="'apple'" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.5 0 2.75-.81 3.25-2.06.5 1.25 1.75 2.06 3.25 2.06 2.5 0 4.5-2 4.5-4.5 0-3-4-6.5-7.75-9.75a.5.5 0 0 0-.6 0C8.5 10 4.5 13.5 4.5 16.5c0 2.5 2 4.5 4.5 4.5 1.5 0 2.75-.81 3.25-2.06.08-.2.16-.38.25-.56a.5.5 0 0 1 .9 0c.09.18.17.36.25.56Z"/><path d="M12 2v2"/><path d="M12 4a3 3 0 0 1 2.24 1"/></svg>
            <svg *ngSwitchCase="'tooth'" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 2c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8c0 5.5 6 12 10 14c4-2 10-8.5 10-14a5.5 5.5 0 0 0-5.5-6Z"/></svg>
          </ng-container>
        </div>

        <h3 class="text-xl font-bold text-gray-800 group-hover:text-white mb-3">{{ program.title }}</h3>
        <p class="text-gray-600 group-hover:text-gray-100 leading-relaxed">
          {{ program.desc }}
        </p>
      </div>

    </div>
  </div>
</section>
