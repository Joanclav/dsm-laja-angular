<section id="horarios" class="container mx-auto px-4 py-16">
  <div class="text-center mb-10">
    <h2 class="text-3xl font-bold text-dsm-main pb-2 border-b-4 border-dsm-main inline-block">
      Horarios de Atención
    </h2>
  </div>
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let center of centers" class="bg-white border-2 border-dsm-main rounded-lg p-6 hover:shadow-lg transition duration-300">
      <h3 class="text-xl font-bold text-dsm-main mb-4 flex items-center gap-2">
        {{ center.name }}
      </h3>
      
      <div class="flex justify-between items-center py-2 border-b border-dashed border-gray-200">
        <span class="font-semibold text-gray-700 text-sm">Lunes a Viernes</span>
        <span class="text-dsm-main font-bold text-sm flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          {{ center.weekday }}
        </span>
      </div>
      
      <div class="flex justify-between items-center py-2">
        <span class="font-semibold text-gray-700 text-sm">Sábados y Festivos</span>
        <span class="text-red-500 font-bold text-sm">{{ center.weekend }}</span>
      </div>
    </div>
  </div>
</section>
