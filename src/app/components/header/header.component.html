<header class="sticky top-0 z-50 flex flex-col w-full shadow-lg">

  <div class="bg-dsm-dark text-white text-xs md:text-sm py-2 border-b border-white/10">
    <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-2">

      <div class="flex items-center gap-4 md:gap-6">
        <div class="flex items-center gap-2 hover:text-gray-200 transition cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <span>contacto&#64;dsmlaja.cl</span>
        </div>
        <div class="flex items-center gap-2 font-bold text-yellow-300 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          <span>URGENCIAS: 131</span>
        </div>
      </div>

      <div class="hidden md:flex items-center gap-2 opacity-90">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Laja, Región del Biobío, Chile</span>
      </div>
    </div>
  </div>

<div class="bg-white py-3 relative z-20 shadow-sm">
    <div class="container mx-auto px-4 flex flex-col md:flex-row md:justify-between md:items-center gap-3 md:gap-0">

      <div class="flex justify-between items-center w-full md:w-auto">

        <div class="flex items-center gap-3">
          <div class="relative w-14 h-14 md:w-20 md:h-20 flex-shrink-0">
             <img src="images/logo-dsm.png" alt="Logo DSM" class="w-full h-full object-contain">
          </div>
          <div>
            <h1 class="text-dsm-main text-lg md:text-2xl font-bold leading-none">DSM Laja</h1>
            <p class="text-gray-500 text-[10px] md:text-sm leading-tight">Departamento de Salud Municipal</p>
          </div>
        </div>

        <button class="md:hidden text-dsm-main p-2 hover:bg-gray-100 rounded-lg transition" (click)="toggleMenu()">
          <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 18 12"/></svg>
        </button>
      </div>

      <div class="opacity-90 md:opacity-80 md:rotate-1 w-full md:w-auto flex justify-center md:block">
        <h2 class="text-xs md:text-2xl lg:text-4xl font-black text-black
        -400 md:text-black-200 uppercase tracking-widest border-2 md:border-4 border-dashed border-gray-300 md:border-gray-200 px-4 py-1 rounded-lg select-none whitespace-nowrap bg-gray-50 md:bg-transparent">
         Página Web en Construcción
        </h2>
      </div>

    </div>
  </div>

<div class="bg-dsm-main text-white hidden md:block shadow-inner relative z-10">

  <nav class="container mx-auto px-4 flex items-center justify-between h-14">

    <div class="flex items-center h-full">
      <a routerLink="/" class="px-4 h-full flex items-center hover:bg-dsm-dark font-medium transition duration-200">
        Inicio
      </a>

      <div class="group relative h-full flex items-center">
        <button class="px-4 h-full hover:bg-dsm-dark font-medium flex items-center gap-1 transition duration-200 cursor-pointer">
          Pedir Hora
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="absolute top-full left-0 bg-white text-gray-800 shadow-xl w-56 hidden group-hover:block py-2 border-t-4 border-dsm-main">
          <a href="#" class="block px-4 py-3 hover:bg-gray-50 hover:text-dsm-main">Reserva Online</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-50 hover:text-dsm-main">Consulta Estado</a>
        </div>
      </div>

      <a href="#horarios" class="px-4 h-full flex items-center hover:bg-dsm-dark font-medium transition duration-200">
        Horarios
      </a>
      <a href="#programas" class="px-4 h-full flex items-center hover:bg-dsm-dark font-medium transition duration-200">
        Programas
      </a>
      <a href="#noticias" class="px-4 h-full flex items-center hover:bg-dsm-dark font-medium transition duration-200">
        Noticias
      </a>
      <a href="#contacto" class="px-4 h-full flex items-center hover:bg-dsm-dark font-medium transition duration-200">
        Contacto
      </a>
    </div>

    <div class="flex items-center gap-3">

      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/login" class="flex items-center gap-2 px-4 py-1.5 text-sm font-medium text-white border border-white/30 rounded-lg hover:bg-white/10 hover:border-white transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Ingresar
        </a>
        <a routerLink="/registro" class="flex items-center gap-2 px-4 py-1.5 text-sm font-bold bg-yellow-400 text-dsm-dark rounded-lg hover:bg-yellow-300 hover:scale-105 transition-all duration-200 shadow-lg shadow-yellow-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" x2="20" y1="8" y2="14"/><line x1="23" x2="17" y1="11" y2="11"/></svg>
          Crear Cuenta
        </a>
      </ng-container>

      <ng-container *ngIf="auth.isLoggedIn()">
        <a routerLink="/accesos" class="flex items-center gap-2 px-4 py-1.5 text-sm font-bold bg-white text-dsm-main rounded-lg hover:bg-gray-100 transition-all duration-200 shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          Panel DSM
        </a>
        <button (click)="auth.logout()" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-colors" title="Cerrar Sesión">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        </button>
      </ng-container>

    </div>

  </nav>
</div>

  <div *ngIf="isOpen" class="md:hidden bg-dsm-dark text-white border-t border-white/20 p-4 flex flex-col gap-2 shadow-inner">
    <a href="#" class="block py-2 px-3 rounded hover:bg-white/10" (click)="isOpen = false">Inicio</a>
    <a href="#horarios" class="block py-2 px-3 rounded hover:bg-white/10" (click)="isOpen = false">Horarios</a>
    <a href="#contacto" class="block py-2 px-3 rounded hover:bg-white/10 font-bold" (click)="isOpen = false">Contacto</a>
  </div>

</header>
